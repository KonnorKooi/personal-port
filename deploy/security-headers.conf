# Security headers for konnorkooi.com (static export served by nginx).
#
# nginx gotcha: an `add_header` inside a `location` block REPLACES all
# inherited add_header directives. So this file is `include`d both at the
# server level AND inside any location that sets its own headers (e.g. the
# caching blocks), to guarantee these are always present.

add_header X-Content-Type-Options        "nosniff" always;
add_header X-Frame-Options               "DENY" always;
add_header Referrer-Policy               "strict-origin-when-cross-origin" always;
add_header Permissions-Policy            "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;

# Force HTTPS for a year. Drop includeSubDomains if you ever serve a
# subdomain over plain HTTP.
add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains" always;

# 'unsafe-inline' is required: the theme-bootstrap script in _document.js and
# the timeline's styling are inline. Everything else is locked to this origin
# plus the Google Fonts / icons8 hosts the site actually loads.
add_header Content-Security-Policy        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.icons8.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
